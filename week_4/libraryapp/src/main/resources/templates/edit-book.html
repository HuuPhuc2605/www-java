<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Book</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f0f2f5;
        }

        .container {
            width: 400px;
            margin: 50px auto;
            background: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: #007bff;
        }

        button {
            width: 100%;
            padding: 10px;
            margin-top: 15px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #0056b3;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 15px;
            text-decoration: none;
            color: #333;
        }

        .back:hover {
            color: #007bff;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Edit Book</h2>

    <form th:action="@{/books/update}" th:object="${book}" method="post">

        <input type="hidden" th:field="*{id}">

        <input th:field="*{title}" placeholder="Title">
        <input th:field="*{author}" placeholder="Author">
        <input th:field="*{price}" placeholder="Price">
        <input th:field="*{publishedYear}" placeholder="Year">

        <select th:field="*{category.id}">
            <option value="">-- Category --</option>
            <option th:each="c : ${categories}"
                    th:value="${c.id}"
                    th:text="${c.name}">
            </option>
        </select>

        <button type="submit">Update</button>
    </form>

    <a href="/books" class="back">Back</a>

</div>

</body>
</html>
